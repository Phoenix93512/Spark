<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Spark</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-2: #f7f7f5; --bg-3: #efeeeb;
    --border: rgba(0,0,0,0.07); --border-strong: rgba(0,0,0,0.12);
    --text: #191919; --text-2: #6b6b6b; --text-3: #aaa;
    --orange: #F46B0E; --orange-light: #FEF0E6; --orange-mid: #FDDBC2;
    --tag-bg: #f0eeeb; --tag-text: #666;
    --font: 'Geist', -apple-system, sans-serif;
    --mono: 'Geist Mono', monospace;
  }
  html, body { height: 100%; background: #e8e6e1; display: flex; align-items: center; justify-content: center; font-family: var(--font); }

  .device {
    width: 375px; height: 812px; background: var(--bg); border-radius: 40px;
    overflow: hidden; position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
    display: flex; flex-direction: column;
  }

  .screen { display: none; flex-direction: column; height: 100%; position: relative; }
  .screen.active { display: flex; }

  .status {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0; font-size: 12px; font-weight: 500; color: var(--text); flex-shrink: 0;
  }
  .status-right { display: flex; gap: 5px; align-items: center; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 0; flex-shrink: 0;
  }
  .topbar-title { font-size: 13px; font-weight: 500; color: var(--text-3); letter-spacing: 0.04em; }
  .icon-btn {
    width: 32px; height: 32px; border: none; background: none; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-3); transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--bg-2); color: var(--text); }
  .icon-btn svg { width: 18px; height: 18px; }
  .back-btn {
    display: flex; align-items: center; gap: 4px; border: none; background: none;
    cursor: pointer; color: var(--text-3); font-size: 13px; font-family: var(--font);
    padding: 4px 0; transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn svg { width: 16px; height: 16px; }

  .content { flex: 1; overflow-y: auto; padding: 0 24px 100px; }
  .content::-webkit-scrollbar { display: none; }

  .section-label {
    font-size: 11px; font-weight: 500; color: var(--text-3);
    letter-spacing: 0.07em; text-transform: uppercase; padding: 20px 0 12px;
  }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 32px; text-align: center; gap: 12px;
  }
  .empty-icon { color: var(--text-3); margin-bottom: 4px; }
  .empty-title { font-size: 14px; font-weight: 500; color: var(--text-2); }
  .empty-sub { font-size: 13px; color: var(--text-3); line-height: 1.5; }

  /* Idea rows */
  .idea-row {
    display: flex; align-items: flex-start; gap: 12px;
    border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.1s; border-radius: 6px;
    margin: 0 -8px; padding: 13px 8px;
  }
  .idea-row:hover { background: var(--bg-2); }
  .idea-row:last-child { border-bottom: none; }
  .idea-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); margin-top: 7px; flex-shrink: 0; }
  .idea-dot.old { background: var(--border-strong); }
  .idea-body { flex: 1; min-width: 0; }
  .idea-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .idea-desc { font-size: 12px; color: var(--text-2); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .idea-meta { display: flex; gap: 6px; align-items: center; margin-top: 7px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--tag-bg); color: var(--tag-text); }
  .tag.orange { background: var(--orange-light); color: var(--orange); }
  .idea-time { font-size: 11px; color: var(--text-3); }

  .view-more-btn {
    width: 100%; border: none; background: none; cursor: pointer;
    font-family: var(--font); font-size: 12px; color: var(--text-3);
    padding: 14px 0; display: flex; align-items: center; gap: 6px; transition: color 0.15s;
  }
  .view-more-btn:hover { color: var(--text); }
  .view-more-btn svg { width: 14px; height: 14px; }

  /* FAB */
  .fab {
    position: absolute; bottom: 32px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--orange); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(244,107,14,0.35);
    transition: transform 0.15s, opacity 0.15s; z-index: 10;
  }
  .fab:hover { transform: scale(1.06); }
  .fab:active { transform: scale(0.97); }
  .fab svg { width: 24px; height: 24px; color: white; }
  .fab.recording { animation: fab-pulse 1s ease-in-out infinite; background: #d45800; }
  @keyframes fab-pulse { 0%,100% { box-shadow: 0 4px 20px rgba(244,107,14,0.35); } 50% { box-shadow: 0 4px 32px rgba(244,107,14,0.7); } }

  /* Detail */
  .detail-header { padding: 4px 24px 16px; flex-shrink: 0; }
  .detail-title { font-size: 21px; font-weight: 500; color: var(--text); letter-spacing: -0.4px; line-height: 1.25; margin-bottom: 6px; }
  .detail-time { font-size: 12px; color: var(--text-3); margin-bottom: 14px; }
  .detail-desc { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 14px; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag-pill { font-size: 11px; padding: 3px 9px; border-radius: 4px; background: var(--tag-bg); color: var(--tag-text); }
  .tag-pill.orange { background: var(--orange-light); color: var(--orange); }

  .block { padding: 20px 24px 0; }
  .block-label { font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
  .summary-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .summary-list li { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; color: var(--text); line-height: 1.55; }
  .bullet { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); margin-top: 8px; flex-shrink: 0; }

  .divider-line { height: 1px; background: var(--border); margin: 20px 24px 0; }

  .transcript-toggle {
    display: flex; align-items: center; gap: 8px; padding: 14px 24px;
    border: none; background: none; cursor: pointer;
    font-family: var(--font); font-size: 12px; color: var(--text-3);
    width: 100%; transition: background 0.1s;
  }
  .transcript-toggle:hover { background: var(--bg-2); }
  .transcript-toggle svg { width: 14px; height: 14px; }
  .chevron { margin-left: auto; width: 14px !important; height: 14px !important; transition: transform 0.2s; }
  .transcript-box {
    display: none; padding: 14px 24px; font-size: 12px; color: var(--text-2);
    line-height: 1.7; background: var(--bg-2); font-family: var(--mono);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .transcript-box.open { display: block; }

  .delete-btn {
    display: flex; align-items: center; gap: 6px; margin: 20px 24px 0;
    border: none; background: none; cursor: pointer; font-family: var(--font);
    font-size: 12px; color: var(--text-3); padding: 8px 0; transition: color 0.15s;
  }
  .delete-btn:hover { color: #eb5757; }
  .delete-btn svg { width: 14px; height: 14px; }

  /* Recording overlay */
  .overlay {
    display: none; position: absolute; inset: 0; background: white; z-index: 20;
    flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    padding: 32px;
  }
  .overlay.active { display: flex; }

  .rec-hint { font-size: 12px; color: var(--text-3); letter-spacing: 0.04em; }
  .rec-time { font-size: 52px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -3px; }
  .rec-waveform { display: flex; gap: 4px; align-items: center; height: 32px; }
  .wave-bar { width: 3px; border-radius: 2px; background: var(--orange); animation: wave 0.9s ease-in-out infinite; }
  .wave-bar:nth-child(1){animation-delay:0s} .wave-bar:nth-child(2){animation-delay:.12s}
  .wave-bar:nth-child(3){animation-delay:.24s} .wave-bar:nth-child(4){animation-delay:.36s}
  .wave-bar:nth-child(5){animation-delay:.24s} .wave-bar:nth-child(6){animation-delay:.12s}
  .wave-bar:nth-child(7){animation-delay:0s}
  @keyframes wave { 0%,100%{height:5px} 50%{height:26px} }
  .rec-stop {
    width: 60px; height: 60px; border-radius: 50%;
    border: 1.5px solid var(--border-strong); background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
  }
  .rec-stop:hover { background: var(--bg-2); }
  .rec-stop-inner { width: 20px; height: 20px; border-radius: 4px; background: var(--text); }

  /* Confirm screen */
  .confirm-transcript {
    width: 100%; background: var(--bg-2); border-radius: 8px; padding: 14px 16px;
    font-size: 13px; color: var(--text-2); line-height: 1.6; font-family: var(--mono);
    max-height: 200px; overflow-y: auto; text-align: left;
  }
  .confirm-transcript::-webkit-scrollbar { display: none; }
  .confirm-status { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
  .confirm-status.ready { color: #22a06b; }
  .confirm-status svg { width: 14px; height: 14px; }
  .spinner-sm { width: 14px; height: 14px; border: 2px solid var(--orange-mid); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-row { display: flex; gap: 10px; width: 100%; }
  .btn {
    flex: 1; padding: 13px; border-radius: 10px; border: none;
    font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: var(--orange); color: white; box-shadow: 0 2px 12px rgba(244,107,14,0.25); }
  .btn-secondary { background: var(--bg-3); color: var(--text-2); }

  /* Paste screen */
  .paste-area {
    width: 100%; min-height: 120px; background: var(--bg-2);
    border: 1.5px dashed var(--border-strong); border-radius: 8px;
    padding: 14px 16px; font-size: 13px; color: var(--text-2);
    line-height: 1.6; font-family: var(--mono); resize: none;
    outline: none; transition: border-color 0.15s;
  }
  .paste-area:focus { border-color: var(--orange); }
  .paste-area::placeholder { color: var(--text-3); }

  .overlay-title { font-size: 16px; font-weight: 500; color: var(--text); align-self: flex-start; }
  .overlay-sub { font-size: 12px; color: var(--text-3); align-self: flex-start; line-height: 1.5; }

  /* Toast */
  .toast {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--text); color: white; font-size: 12px; padding: 8px 16px;
    border-radius: 20px; opacity: 0; transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; pointer-events: none; z-index: 30;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Error */
  .error-box {
    width: 100%; background: #fff5f5; border: 1px solid #fddede;
    border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #c0392b;
    line-height: 1.5; display: none;
  }
  .error-box.show { display: block; }
</style>
</head>
<body>
<div class="device">

  <!-- HOME -->
  <div class="screen active" id="screen-inbox">
    <div class="status">
      <span>9:41</span>
      <div class="status-right">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4" y="2" width="3" height="9" rx="1"/><rect x="8" y="0" width="3" height="11" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity=".3"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor"><rect x="0" y="1" width="21" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none" opacity=".35"/><rect x="1" y="2" width="16" height="8" rx="1.5"/><rect x="22" y="3.5" width="2" height="5" rx="1" opacity=".4"/></svg>
      </div>
    </div>
    <div class="topbar">
      <span class="topbar-title">spark</span>
      <button class="icon-btn" onclick="searchIdeas()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 3 3"/></svg>
      </button>
    </div>

    <div id="inbox-content" class="content"></div>

    <button class="fab" id="fabBtn" onclick="startRecording()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.5-1.5 4.5-3 6H9c-1.5-1.5-3-3.5-3-6a6 6 0 0 1 6-6z"/>
        <path d="M9 17v1a3 3 0 0 0 6 0v-1"/>
      </svg>
    </button>
    <div class="toast" id="toast"></div>
  </div>

  <!-- ALL IDEAS -->
  <div class="screen" id="screen-all">
    <div class="status"><span>9:41</span></div>
    <div class="topbar">
      <button class="back-btn" onclick="showScreen('screen-inbox')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
        Home
      </button>
    </div>
    <div id="all-content" class="content" style="padding-top:0;">
      <div class="section-label">All ideas</div>
    </div>
    <button class="fab" onclick="startRecording()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.5-1.5 4.5-3 6H9c-1.5-1.5-3-3.5-3-6a6 6 0 0 1 6-6z"/>
        <path d="M9 17v1a3 3 0 0 0 6 0v-1"/>
      </svg>
    </button>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="screen-detail">
    <div class="status"><span>9:41</span></div>
    <div class="topbar">
      <button class="back-btn" id="detail-back-btn" onclick="showScreen('screen-inbox')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
        Inbox
      </button>
      <button class="icon-btn" onclick="deleteCurrentIdea()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
    <div class="content" id="detail-content" style="padding-top:8px; padding-bottom:40px;"></div>
    <button class="fab" onclick="startRecording()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.5-1.5 4.5-3 6H9c-1.5-1.5-3-3.5-3-6a6 6 0 0 1 6-6z"/>
        <path d="M9 17v1a3 3 0 0 0 6 0v-1"/>
      </svg>
    </button>
  </div>

  <!-- RECORDING OVERLAY -->
  <div class="overlay" id="overlay-recording">
    <div class="rec-hint" id="rec-hint">tap lightbulb to start</div>
    <div class="rec-time" id="rec-time">0:00</div>
    <div class="rec-waveform" id="rec-waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <button class="rec-stop" id="rec-stop-btn" onclick="stopRecording()">
      <div class="rec-stop-inner"></div>
    </button>
    <div class="error-box" id="rec-error"></div>
    <button class="btn btn-secondary" style="width:100%;" onclick="cancelRecording()">Cancel</button>
  </div>

  <!-- CONFIRM OVERLAY -->
  <div class="overlay" id="overlay-confirm" style="gap:16px;">
    <div class="overlay-title">Your idea</div>
    <div class="confirm-transcript" id="confirm-transcript"></div>
    <div class="confirm-status" id="confirm-status">
      <div class="spinner-sm"></div>
      Sending to Claude.ai...
    </div>
    <div class="error-box" id="confirm-error"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="cancelConfirm()">Discard</button>
      <button class="btn btn-primary" id="open-claude-btn" onclick="openClaude()" disabled style="opacity:0.5;">Open Claude.ai →</button>
    </div>
  </div>

  <!-- PASTE OVERLAY -->
  <div class="overlay" id="overlay-paste" style="gap:16px;">
    <div class="overlay-title">Paste Claude's response</div>
    <div class="overlay-sub">Copy the JSON Claude gave you and paste it below</div>
    <textarea class="paste-area" id="paste-area" placeholder='Paste Claude response here...' oninput="parsePaste()"></textarea>
    <div class="error-box" id="paste-error"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="cancelPaste()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveIdea()" disabled style="opacity:0.5;">Save idea</button>
    </div>
  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let ideas = JSON.parse(localStorage.getItem('spark-ideas') || '[]');
let currentTranscript = '';
let pendingIdea = null;
let currentIdeaId = null;
let recognition = null;
let recTimer = null;
let recSeconds = 0;
let fromScreen = 'screen-inbox';

// ─── Init ─────────────────────────────────────────────────────────────────────
renderInbox();

// ─── Screen nav ──────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showOverlay(id) {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function hideOverlays() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
}

// ─── Render inbox ─────────────────────────────────────────────────────────────
function renderInbox() {
  const container = document.getElementById('inbox-content');
  const allContainer = document.getElementById('all-content');

  if (ideas.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.5-1.5 4.5-3 6H9c-1.5-1.5-3-3.5-3-6a6 6 0 0 1 6-6z"/>
            <path d="M9 17v1a3 3 0 0 0 6 0v-1"/>
          </svg>
        </div>
        <div class="empty-title">No ideas yet</div>
        <div class="empty-sub">Tap the lightbulb to capture your first idea</div>
      </div>`;
    return;
  }

  const recent = ideas.slice(0, 3);
  const older = ideas.slice(3);
  const now = Date.now();

  let html = '<div class="section-label">Recent</div>';
  recent.forEach(idea => {
    html += ideaRowHTML(idea, now);
  });

  if (older.length > 0) {
    html += `<button class="view-more-btn" onclick="showAllIdeas()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9l6 6 6-6"/></svg>
      ${older.length} more idea${older.length > 1 ? 's' : ''}
    </button>`;
  }

  container.innerHTML = html;

  // All ideas screen
  let allHtml = '<div class="section-label">All ideas</div>';
  ideas.forEach(idea => { allHtml += ideaRowHTML(idea, now); });
  allContainer.innerHTML = allHtml;
}

function ideaRowHTML(idea, now) {
  const isNew = (now - idea.createdAt) < 3600000 * 4;
  const tags = (idea.tags || []).slice(0, 2);
  const firstTag = tags[0] || '';
  const timeStr = timeAgo(idea.createdAt);
  return `<div class="idea-row" onclick="openIdea('${idea.id}')">
    <div class="idea-dot ${isNew ? '' : 'old'}"></div>
    <div class="idea-body">
      <div class="idea-title">${escHtml(idea.title)}</div>
      <div class="idea-desc">${escHtml(idea.description)}</div>
      <div class="idea-meta">
        ${firstTag ? `<span class="tag orange">${escHtml(firstTag)}</span>` : ''}
        ${tags.slice(1).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}
        <span class="idea-time">${timeStr}</span>
      </div>
    </div>
  </div>`;
}

function showAllIdeas() {
  renderInbox();
  showScreen('screen-all');
}

// ─── Open idea detail ─────────────────────────────────────────────────────────
function openIdea(id) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  currentIdeaId = id;

  const bulletsHtml = (idea.bullets || []).map(b =>
    `<li><div class="bullet"></div>${escHtml(b)}</li>`).join('');
  const tagsHtml = (idea.tags || []).map((t, i) =>
    `<span class="tag-pill ${i === 0 ? 'orange' : ''}">${escHtml(t)}</span>`).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${escHtml(idea.title)}</div>
      <div class="detail-time">${timeAgo(idea.createdAt)}</div>
      <div class="detail-desc">${escHtml(idea.description)}</div>
      <div class="detail-tags">${tagsHtml}</div>
    </div>
    <div class="block">
      <div class="block-label">Summary</div>
      <ul class="summary-list">${bulletsHtml}</ul>
    </div>
    <div class="divider-line"></div>
    <button class="transcript-toggle" onclick="toggleTranscript()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Original transcript
      <svg class="chevron" id="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="transcript-box" id="transcript-box">${escHtml(idea.transcript || '')}</div>
  `;

  showScreen('screen-detail');
}

function toggleTranscript() {
  const box = document.getElementById('transcript-box');
  const ch = document.getElementById('chevron');
  box.classList.toggle('open');
  ch.style.transform = box.classList.contains('open') ? 'rotate(180deg)' : '';
}

function deleteCurrentIdea() {
  if (!currentIdeaId) return;
  if (!confirm('Delete this idea?')) return;
  ideas = ideas.filter(i => i.id !== currentIdeaId);
  saveIdeas();
  renderInbox();
  showScreen('screen-inbox');
  showToast('Idea deleted');
}

// ─── Recording ────────────────────────────────────────────────────────────────
function startRecording() {
  currentTranscript = '';
  document.getElementById('rec-error').classList.remove('show');
  document.getElementById('rec-error').textContent = '';
  document.getElementById('rec-hint').textContent = 'listening...';
  document.getElementById('rec-time').textContent = '0:00';
  document.getElementById('rec-waveform').style.opacity = '1';
  showOverlay('overlay-recording');

  // Check support
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showRecError('Speech recognition not supported in this browser. Use Chrome or Edge.');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    currentTranscript = (currentTranscript + final).trim();
    if (interim) document.getElementById('rec-hint').textContent = interim;
    else document.getElementById('rec-hint').textContent = currentTranscript ? '...' : 'listening...';
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') showRecError('Microphone access denied. Please allow mic access and try again.');
    else if (e.error !== 'no-speech') showRecError('Error: ' + e.error + '. Please try again.');
  };

  recognition.onend = () => {
    if (recTimer) stopTimer();
  };

  try {
    recognition.start();
    startTimer();
  } catch(e) {
    showRecError('Could not start recording: ' + e.message);
  }
}

function startTimer() {
  recSeconds = 0;
  recTimer = setInterval(() => {
    recSeconds++;
    const m = Math.floor(recSeconds / 60);
    const s = recSeconds % 60;
    document.getElementById('rec-time').textContent = m + ':' + String(s).padStart(2,'0');
  }, 1000);
}

function stopTimer() {
  clearInterval(recTimer);
  recTimer = null;
}

function stopRecording() {
  stopTimer();
  if (recognition) { recognition.stop(); recognition = null; }
  hideOverlays();

  if (!currentTranscript.trim()) {
    showToast('No speech detected — try again');
    return;
  }
  showConfirm();
}

function cancelRecording() {
  stopTimer();
  if (recognition) { recognition.stop(); recognition = null; }
  hideOverlays();
}

function showRecError(msg) {
  stopTimer();
  document.getElementById('rec-error').textContent = msg;
  document.getElementById('rec-error').classList.add('show');
  document.getElementById('rec-waveform').style.opacity = '0.2';
  document.getElementById('rec-hint').textContent = '';
}

// ─── Confirm + Claude prompt ──────────────────────────────────────────────────
function showConfirm() {
  document.getElementById('confirm-transcript').textContent = currentTranscript;
  document.getElementById('confirm-status').innerHTML = '<div class="spinner-sm"></div> Building Claude prompt...';
  document.getElementById('confirm-error').classList.remove('show');
  document.getElementById('open-claude-btn').disabled = true;
  document.getElementById('open-claude-btn').style.opacity = '0.5';
  showOverlay('overlay-confirm');

  // Build prompt
  setTimeout(() => {
    buildClaudePrompt();
  }, 600);
}

function buildClaudePrompt() {
  const existingTags = [...new Set(ideas.flatMap(i => i.tags || []))].slice(0, 15).join(', ');
  const prompt = `Here is a raw spoken idea I want to capture. Please summarize it and return ONLY a valid JSON object with no extra text, no markdown, no backticks.

Raw idea: "${currentTranscript}"

${existingTags ? `Existing tags to reuse if relevant: ${existingTags}` : ''}

Return exactly this JSON structure:
{
  "title": "Short clear title (max 6 words)",
  "description": "One sentence that captures the core insight",
  "bullets": ["Key point 1", "Key point 2", "Key point 3"],
  "tags": ["tag1", "tag2"]
}

Rules:
- bullets: 2-4 concise points, each under 15 words
- tags: 1-3 lowercase single words, reuse existing tags where possible
- Return ONLY the JSON, nothing else`;

  window._claudePrompt = prompt;

  document.getElementById('confirm-status').innerHTML = `
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#22a06b">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    <span style="color:#22a06b">Prompt ready — open Claude.ai to summarize</span>`;
  document.getElementById('open-claude-btn').disabled = false;
  document.getElementById('open-claude-btn').style.opacity = '1';
}

function openClaude() {
  if (!window._claudePrompt) return;
  const encoded = encodeURIComponent(window._claudePrompt);
  const url = `https://claude.ai/new?q=${encoded}`;
  window.open(url, '_blank');

  // Move to paste screen
  setTimeout(() => {
    hideOverlays();
    document.getElementById('paste-area').value = '';
    document.getElementById('paste-error').classList.remove('show');
    document.getElementById('save-btn').disabled = true;
    document.getElementById('save-btn').style.opacity = '0.5';
    pendingIdea = null;
    showOverlay('overlay-paste');
  }, 400);
}

function cancelConfirm() {
  hideOverlays();
  currentTranscript = '';
}

// ─── Paste + parse ────────────────────────────────────────────────────────────
function parsePaste() {
  const raw = document.getElementById('paste-area').value.trim();
  const errBox = document.getElementById('paste-error');
  const saveBtn = document.getElementById('save-btn');
  errBox.classList.remove('show');
  pendingIdea = null;

  if (!raw) {
    saveBtn.disabled = true;
    saveBtn.style.opacity = '0.5';
    return;
  }

  try {
    // Strip any markdown fences Claude might add
    const cleaned = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);

    // Validate
    if (!parsed.title || !parsed.bullets || !Array.isArray(parsed.bullets)) {
      throw new Error('Missing required fields');
    }

    pendingIdea = {
      id: Date.now().toString(),
      title: parsed.title,
      description: parsed.description || '',
      bullets: parsed.bullets,
      tags: parsed.tags || [],
      transcript: currentTranscript,
      createdAt: Date.now()
    };

    saveBtn.disabled = false;
    saveBtn.style.opacity = '1';
  } catch(e) {
    errBox.textContent = 'Could not parse response. Make sure you copied the full JSON from Claude.';
    errBox.classList.add('show');
    saveBtn.disabled = true;
    saveBtn.style.opacity = '0.5';
  }
}

function saveIdea() {
  if (!pendingIdea) return;
  ideas.unshift(pendingIdea);
  saveIdeas();
  renderInbox();
  hideOverlays();
  currentTranscript = '';
  pendingIdea = null;
  showToast('Idea saved ✓');
}

function cancelPaste() {
  hideOverlays();
  currentTranscript = '';
  pendingIdea = null;
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function saveIdeas() {
  localStorage.setItem('spark-ideas', JSON.stringify(ideas));
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  const hr = Math.floor(diff / 3600000);
  const day = Math.floor(diff / 86400000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  if (hr < 24) return `${hr}h ago`;
  if (day === 1) return 'yesterday';
  return `${day} days ago`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function searchIdeas() {
  const q = prompt('Search ideas:');
  if (!q) return;
  const results = ideas.filter(i =>
    i.title.toLowerCase().includes(q.toLowerCase()) ||
    i.description.toLowerCase().includes(q.toLowerCase()) ||
    (i.tags || []).some(t => t.toLowerCase().includes(q.toLowerCase()))
  );
  showToast(results.length ? `${results.length} result${results.length > 1 ? 's' : ''} found` : 'No results');
}
</script>
